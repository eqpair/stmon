            const form = document.getElementById('trade-entry-form');

            document.getElementById('entry-date').value = today;
            
            // 폼 제출 이벤트

                // 폼 데이터 수집

                // 데이터 유효성 검사

        // 폼 데이터 수집
        function collectFormData() {
            const stockName = document.getElementById('stock-name').value;
            const stockInfo = stockCodeMap[stockName] || { code: '', preferredCode: '' };
            
            return {
                id: Date.now(), // 고유 ID 생성
                stockName: stockName,
                stockCode: stockInfo.code,
                preferredCode: stockInfo.preferredCode,
                entryDate: document.getElementById('entry-date').value,
                status: 'active',
                longEntry: {
                    price: parseInt(document.getElementById('long-entry-price').value),
                    quantity: parseInt(document.getElementById('long-quantity').value),
                    fee: parseFloat(document.getElementById('long-fee').value)
                },
                shortEntry: {
                    price: parseInt(document.getElementById('short-entry-price').value),
                    quantity: parseInt(document.getElementById('short-quantity').value),
                    fee: parseFloat(document.getElementById('short-fee').value)
                },
                exitDate: null,
                exitLongPrice: null,
                exitShortPrice: null,
                notes: document.getElementById('notes').value
            };
        }

        // 폼 데이터 유효성 검사
        function validateFormData(data) {
            // 기본 필드 검증
            if (!data.stockName || !data.entryDate) {
                showModal('error', '필수 필드를 모두 입력해주세요.');
                return false;
            }
            
            // 롱/숏 수량 일치 검사
            if (data.longEntry.quantity !== data.shortEntry.quantity) {
                const result = confirm('롱 포지션과 숏 포지션의 수량이 다릅니다. 계속 진행하시겠습니까?');
                if (!result) {
                    return false;
                }
            }
            
            // 매매 가격 검증
            if (data.longEntry.price <= 0 || data.shortEntry.price <= 0) {
                showModal('error', '가격은 0보다 커야 합니다.');
                return false;
            }
            
            return true;
        }
        // 폼 제출 이벤트 처리
        document.addEventListener('DOMContentLoaded', function () {
            const form = document.getElementById('entryForm');  // 폼의 ID에 맞게 수정

            form.addEventListener('submit', function (e) {
                e.preventDefault();

                // 폼 데이터 수집
                const entryData = {
                    symbol: document.getElementById('symbol').value,
                    type: document.getElementById('type').value,
                    price: parseInt(document.getElementById('price').value),
                    quantity: parseInt(document.getElementById('quantity').value),
                    reason: document.getElementById('reason').value
                };

                // API 호출 (라즈베리파이 IP 주소로 변경)
                fetch('http://192.168.0.51:5002/api/trade-entry', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)  // 데이터를 JSON 문자열로 변환
                })
                    .then(response => response.json())
                    .then(data => {
                        if (data.status === 'success') {
                            // 성공 처리
                            console.log('저장 성공:', data.message);
                        } else {
                            // 오류 처리
                            console.error('저장 실패:', data.message);
                        }
                    })
                    .catch(error => {
                        console.error('API 요청 오류:', error);
                        // 로컬 스토리지에 임시 저장
                    });
            });
        });

        // 거래 데이터 저장
        async function saveTradeData(newTrade) {
            try {
                // 기본 URL 설정 (GitHub Pages 환경 고려)
                const baseUrl = window.location.hostname.includes('github.io') ? '/stmon' : '';

                // 기존 거래 데이터 로드
                const response = await fetch(`${baseUrl}/data/trades.json`);
                let tradesData = [];

                if (response.ok) {
                    tradesData = await response.json();
                }

                // 새 거래 추가
                tradesData.push(newTrade);

                // 로컬 스토리지에 백업
                localStorage.setItem('lastTradeEntry', JSON.stringify(newTrade));

                // GitHub Pages에 저장 시도
                const saveResponse = await fetch(`${baseUrl}/data/trades.json`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(tradesData)
                });

                if (saveResponse.ok) {
                    // 성공적으로 저장된 경우
                    showModal('success', '거래가 성공적으로 저장되었습니다.', () => {
                        window.location.href = 'trades.html';
                    });
                } else {
                    // GitHub Pages에서 PUT 요청 실패 시 로컬 스토리지에 백업
                    localStorage.setItem('lastTradeEntry', JSON.stringify(newTrade));
                    showModal('warning', '주의: 서버에 저장할 수 없습니다. 로컬 스토리지에 임시 저장되었습니다.', () => {
                        window.location.href = 'trades.html';
                    });
                }
            } catch (error) {
                console.error('Error saving trade data:', error);
                showModal('error', '오류가 발생했습니다: ' + error.message);
            }
        }

        // 결과 모달 표시
        function showModal(type, message, callback) {
            const modal = document.getElementById('result-modal');
            const content = document.getElementById('modal-content');
            
            // 아이콘 및 메시지 스타일 설정
            let icon = '';
            let textColor = '';
            
            switch (type) {
                case 'success':
                    icon = '<i class="fas fa-check-circle text-green-500 text-5xl mb-4"></i>';
                    textColor = 'text-green-700';
                    break;
                case 'error':
                    icon = '<i class="fas fa-times-circle text-red-500 text-5xl mb-4"></i>';
                    textColor = 'text-red-700';
                    break;
                case 'warning':
                    icon = '<i class="fas fa-exclamation-triangle text-yellow-500 text-5xl mb-4"></i>';
                    textColor = 'text-yellow-700';
                    break;
            }
            
            // 내용 설정
            content.innerHTML = `
                ${icon}
                <p class="${textColor} text-lg">${message}</p>
            `;
            
            // 콜백 설정
            if (callback) {
                document.getElementById('modal-close').onclick = () => {
                    hideModal();
                    callback();
                };
            } else {
                document.getElementById('modal-close').onclick = hideModal;
            }
            
            // 모달 표시
            modal.classList.remove('hidden');
        }

        // 모달 숨기기
        function hideModal() {
            document.getElementById('result-modal').classList.add('hidden');
        }
    </script>
</body>
